version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - HOST=0.0.0.0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8001:8001"
    volumes:
      - ./frontend:/app
    environment:
      - API_URL=http://localhost:8000/api
      - HOST=0.0.0.0
      - FRONTEND_HOST=0.0.0.0
    depends_on:
      - backend
