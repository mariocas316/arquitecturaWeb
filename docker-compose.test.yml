version: '3.8'

services:
  backend:
    image: ghcr.io/mariocas316/arquitecturaweb-backend:latest
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0

  frontend:
    image: ghcr.io/mariocas316/arquitecturaweb-frontend:latest
    ports:
      - "3000:3000"
      - "8001:8001"
    environment:
      - API_URL=http://backend:8000/api
    depends_on:
      - backend
